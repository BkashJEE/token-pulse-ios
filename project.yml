name: TokenPulse
options:
  bundleIdPrefix: com.bkashjee
  deploymentTarget:
    iOS: "17.0"
targets:
  TokenPulse:
    type: application
    platform: iOS
    sources:
      - TokenPulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bkashjee.tokenpulse.mobile
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Token Pulse
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - TokenPulseTests
  TokenPulseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TokenPulseTests
    dependencies:
      - target: TokenPulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bkashjee.tokenpulse.mobile.tests
        GENERATE_INFOPLIST_FILE: YES
